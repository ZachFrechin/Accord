name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
          - ubuntu-latest

    env:
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_API_URL: ${{ vars.VITE_API_URL }}
      VITE_GATEWAY_URL: ${{ vars.VITE_GATEWAY_URL }}
      VITE_LIVEKIT_URL: ${{ vars.VITE_LIVEKIT_URL }}
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Validate release environment
        shell: bash
        run: |
          node - <<'NODE'
          const required = [
            'VITE_SUPABASE_URL',
            'VITE_SUPABASE_ANON_KEY',
            'VITE_API_URL',
            'VITE_GATEWAY_URL',
            'VITE_LIVEKIT_URL',
          ];

          const missing = required.filter((key) => !process.env[key]);
          if (missing.length > 0) {
            console.error(`Missing release environment variables: ${missing.join(', ')}`);
            process.exit(1);
          }

          for (const key of required.filter((key) => key !== 'VITE_SUPABASE_ANON_KEY')) {
            new URL(process.env[key]);
          }
          NODE

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build desktop installer
        run: npm run dist -w @discord2/desktop -- --publish never

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ runner.os }}
          path: |
            apps/desktop/release/**/*.exe
            apps/desktop/release/**/*.dmg
            apps/desktop/release/**/*.zip
            apps/desktop/release/**/*.deb
            apps/desktop/release/**/*.AppImage
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-desktop
    runs-on: ubuntu-latest

    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*.exe
            release-artifacts/**/*.dmg
            release-artifacts/**/*.zip
            release-artifacts/**/*.deb
            release-artifacts/**/*.AppImage
          generate_release_notes: true
