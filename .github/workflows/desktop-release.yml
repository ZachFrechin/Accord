name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
          - ubuntu-latest

    env:
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_API_URL: ${{ vars.VITE_API_URL }}
      VITE_GATEWAY_URL: ${{ vars.VITE_GATEWAY_URL }}
      VITE_LIVEKIT_URL: ${{ vars.VITE_LIVEKIT_URL }}
      CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
      CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Prepare macOS notarization key
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [ -z "$APPLE_API_KEY_BASE64" ] || [ -z "$APPLE_API_KEY_ID" ]; then
            echo "Missing APPLE_API_KEY_BASE64 or APPLE_API_KEY_ID."
            exit 1
          fi

          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 -D > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY=$key_path" >> "$GITHUB_ENV"

      - name: Validate release environment
        shell: bash
        run: |
          node - <<'NODE'
          const required = [
            'VITE_SUPABASE_URL',
            'VITE_SUPABASE_ANON_KEY',
            'VITE_API_URL',
            'VITE_GATEWAY_URL',
            'VITE_LIVEKIT_URL',
          ];

          const missing = required.filter((key) => !process.env[key]);
          if (missing.length > 0) {
            console.error(`Missing release environment variables: ${missing.join(', ')}`);
            process.exit(1);
          }

          if (process.env.RUNNER_OS === 'macOS') {
            const macRequired = [
              'CSC_LINK',
              'CSC_KEY_PASSWORD',
              'APPLE_API_KEY',
              'APPLE_API_KEY_ID',
              'APPLE_API_ISSUER',
            ];
            const missingMac = macRequired.filter((key) => !process.env[key]);
            if (missingMac.length > 0) {
              console.error(
                `Missing macOS signing/notarization secrets: ${missingMac.join(', ')}`,
              );
              process.exit(1);
            }
          }

          for (const key of required.filter((key) => key !== 'VITE_SUPABASE_ANON_KEY')) {
            new URL(process.env[key]);
          }
          NODE

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build desktop installer
        run: npm run dist -w @discord2/desktop -- --publish never

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ runner.os }}
          path: |
            apps/desktop/release/**/Discord2-*.exe
            apps/desktop/release/**/Discord2-*.dmg
            apps/desktop/release/**/Discord2-*.zip
            apps/desktop/release/**/Discord2-*.deb
            apps/desktop/release/**/Discord2-*.AppImage
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-desktop
    runs-on: ubuntu-latest

    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/Discord2-*.exe
            release-artifacts/**/Discord2-*.dmg
            release-artifacts/**/Discord2-*.zip
            release-artifacts/**/Discord2-*.deb
            release-artifacts/**/Discord2-*.AppImage
          generate_release_notes: true
